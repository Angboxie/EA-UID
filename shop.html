<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - Essentially Australia</title>
    <link rel="stylesheet" href="CSS/style.css">
    <script src="JS/main.js" defer></script>
    <script src="JS/shop.js" defer></script>
</head>

<body class="shop-page">
    <header class="site-header"></header>

    <!-- desktop breadcrumbs only-->
    <nav class="breadcrumb" aria-label="Breadcrumb">
        <ol>
            <li>
                <a href="shop.html">Shop</a>
            </li>
            <li>Single Oils</li>
        </ol>
    </nav>

    <main>

        <!-- Shop header, the dark green block -->
         <section class="shop-header">

            <!-- mobile only label -->
             <p class="shop-label">SINGLE OILS</p>

             <h1 class="shop-title">One plant.
                <br>One oil.
             </h1>
             <p class="shop-desc">Each oil distilled from a single Australian native botanical. Grown, harvested and bottled at source.</p>

             <!-- stats bar mobile only-->
            <ul class="shop-stats">
                <li class="shop-stat">
                    <strong>38+</strong>
                    <span>Native Oils</span>
                </li>

                <li class="shop-stat">
                    <strong>100% Pure</strong>
                    <span>Ethically Sourced</span>
                </li>

                <li class="shop-stat">
                    <strong>Byron Bay</strong>
                    <span>Full Origin</span>
                </li>
            </ul>

            <!-- Filter and sort section-->
            <form class="shop-filter-bar">
                <button class="filter-btn" aria-label="Filter and Sort products">
                    <span class="filter-icon">≡</span>
                    Filter and Sort
                </button>
                <span class="shop-count">38+ oils</span>
            </form>

         </section>

         <!--product listing part, I decided to put it in JS instead since I dont wanna waste so much code and space.-->
         
         <section class="product-list" aria-label="All Oils">
            <!-- The js cards will then generate right here-->
         </section>

         <!-- load more section -->
         <footer class="shop-load-more">
            <button class="btn-load-more">Load More</button>
         </footer>
    </main>
</body>
</html>
